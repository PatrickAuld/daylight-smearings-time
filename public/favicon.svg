<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" role="img" aria-label="Daylight Smearings Time">
  <!-- coin: full-bleed disc so the mark reads on light or dark browser tabs -->
  <circle cx="20" cy="20" r="20" fill="#101D2C"/>
  <!-- dial -->
  <circle cx="20" cy="20" r="14.5" fill="none" stroke="#F6F0E2" stroke-width="2"/>
  <g stroke-linecap="round">
    <!-- minute hand, fixed at 12 -->
    <path d="M20 20 L20 8.5" stroke="#F6F0E2" stroke-width="2.6"/>
    <!-- hour hand smearing toward ~4 o'clock, fading as it goes -->
    <path d="M20 20 L28.8 24.8" stroke="#E0662A" stroke-width="2.8"/>
    <path d="M20 20 L27.4 26.6" stroke="#E0662A" stroke-width="2.4" opacity=".5"/>
    <path d="M20 20 L25.6 27.8" stroke="#E0662A" stroke-width="2" opacity=".24"/>
  </g>
  <!-- hub -->
  <circle cx="20" cy="20" r="2.2" fill="#F6F0E2"/>
</svg>
